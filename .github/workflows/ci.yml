name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv venv && uv pip install -e ".[dev]"
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run mypy src

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: avengine_test
          POSTGRES_USER: avengine
          POSTGRES_PASSWORD: avengine
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv venv --python ${{ matrix.python-version }}
      - run: uv pip install -e ".[dev]"
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://avengine:avengine@localhost:5432/avengine_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-at-least-32-chars!!
        run: uv run pytest -x -q

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push on PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
